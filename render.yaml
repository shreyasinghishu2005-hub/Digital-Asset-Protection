# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: digital-asset-protection-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        value: "*"
